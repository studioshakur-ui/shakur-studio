    <title>SHAKUR STUDIO — AI · Web · Automation</title>

    <script>
      (function () {
        try {
          var lang = localStorage.getItem('cncs-language');
          if (lang === 'fr' || lang === 'it' || lang === 'en') {
            document.documentElement.lang = lang;
          } else {
            var nav = (navigator.language || 'en').toLowerCase();
            document.documentElement.lang = nav.startsWith('it') ? 'it' : nav.startsWith('fr') ? 'fr' : 'en';
          }
          var theme = localStorage.getItem('cncs-theme');
          if (theme === 'dark' || theme === 'light') {
            document.documentElement.dataset.theme = theme;
          } else {
            document.documentElement.dataset.theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
        } catch (_e) {}
      })();
    </script>
